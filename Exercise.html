
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration Form</title>
<style>
    body {
        font-family: Georgia, serif;
        background-color: #e8cfc7;
    }
    .container {
        width: 600px;
        margin: auto;
        padding: 20px;
    }
    h1 {
        text-align: center;
    }
    label {
        display: inline-block;
        width: 150px;
        margin: 8px 0;
    }
    input, select, textarea {
        padding: 5px;
        margin: 5px 0;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    textarea {
        width: 60%;
    }
    .row {
        margin-bottom: 10px;
    }
    .btn {
        display: block;
        margin: 20px auto;
        padding: 5px 15px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Student Registration Form</h1>

    <div class="row">
        <label>Roll no. :</label>
        <input type="text">
    </div>

    <div class="row">
        <label>Student name :</label>
        <input type="text" placeholder="First Name"> -
        <input type="text" placeholder="Last Name">
    </div>

    <div class="row">
        <label>Father's name :</label>
        <input type="text">
    </div>

    <div class="row">
        <label>Date of birth :</label>
        <input type="text" placeholder="Day" size="4"> -
        <input type="text" placeholder="Month" size="6"> -
        <input type="text" placeholder="Year" size="6">
        (DD-MM-YYYY)
    </div>

    <div class="row">
        <label>Mobile no. :</label>
        +91 -
        <input type="text">
    </div>

    <div class="row">
        <label>Email id :</label>
        <input type="email">
    </div>

    <div class="row">
        <label>Password :</label>
        <input type="password">
    </div>

    <div class="row">
        <label>Gender :</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
    </div>

    <div class="row">
        <label>Department :</label>
        <input type="checkbox"> CSE
        <input type="checkbox"> IT
        <input type="checkbox"> ECE
        <input type="checkbox"> Civil
        <input type="checkbox"> Mech
    </div>

    <div class="row">
        <label>Course :</label>
        <select>
            <option>Select Current Course</option>
            <option>B.Tech</option>
            <option>M.Tech</option>
            <option>BCA</option>
            <option>MCA</option>
        </select>
    </div>

    <div class="row">
        <label>Student photo :</label>
        <input type="file">
    </div>

    <div class="row">
        <label>City :</label>
        <input type="text">
    </div>

    <div class="row">
        <label>Address :</label><br>
        <textarea rows="4" cols="50"></textarea>
    </div>

    <button class="btn">Register</button>

</div>

</body>
</html>
